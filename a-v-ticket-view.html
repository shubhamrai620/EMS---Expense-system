<script>
// ═══════════════════════════════════════════════════════════════════════════
// VIEWS.HTML  —  Expense Management System  (Redesigned)
//
// Architecture decisions:
//   • EXPENSE_CATALOG      — Head → SubHead taxonomy (3 domains + custom)
//   • UnifiedModal         — single <v-dialog> system, size varies per mode
//   • ExpenseLineEditor    — inline multi-row add (appends to list on Add)
//   • PrintHelper          — window.print() with injected print-only styles
//   • FileValidator        — 5 MB per file, 20 MB total, 2 PDF max
//   • OverflowManager-safe — JSON fields always go through store; no direct
//                            cell writes from frontend
//
// Views:  LoginView · DashboardView · ExpensesView · TicketsView
// ═══════════════════════════════════════════════════════════════════════════


// ── EXPENSE HEAD/SUBHEAD CATALOG ────────────────────────────────────────────
const EXPENSE_CATALOG = {
  // ── Mobilization ──────────────────────────────────────────────────────────
  'Mobilization': {
    icon: 'mdi-truck-delivery-outline',
    subHeads: ['Transportation', 'Fuel & Vehicle', 'Equipment Hiring', 'Labour Mobilization',
               'Logistics & Freight', 'Loading / Unloading', 'Food & Meals (Travel)',
               'Accommodation (Travel)', 'Custom / Other'],
  },
  // ── Admin Cost ────────────────────────────────────────────────────────────
  'Admin Cost': {
    icon: 'mdi-office-building-outline',
    subHeads: ['Office Rent', 'Utilities', 'Stationery & Supplies', 'Printing & Photocopying',
               'Communication (Phone/Internet)', 'Software & Subscriptions',
               'Postage & Courier', 'Miscellaneous Admin', 'Custom / Other'],
  },
  // ── Training ──────────────────────────────────────────────────────────────
  'Training': {
    icon: 'mdi-school-outline',
    subHeads: ['Trainer Fees', 'Training Materials', 'Venue & Arrangement', 'Participant Travel',
               'Participant Accommodation', 'Refreshments', 'Certification Fees', 'Custom / Other'],
  },
  // ── Expenses Center ───────────────────────────────────────────────────────
  'Expenses Center': {
    icon: 'mdi-receipt-text-outline',
    subHeads: ['Medical & Health', 'Safety & PPE', 'Repairs & Maintenance', 'Fuel (Ops)',
               'Entertainment & Client', 'Marketing & Promotion', 'Legal & Professional',
               'Taxes & Duties', 'Custom / Other'],
  },
  // ── Custom ────────────────────────────────────────────────────────────────
  'Custom': {
    icon: 'mdi-tag-plus-outline',
    subHeads: ['Custom / Other'],
  },
};

const EXPENSE_HEADS = Object.keys(EXPENSE_CATALOG);

function subHeadsFor(head) {
  return (EXPENSE_CATALOG[head] || EXPENSE_CATALOG['Custom']).subHeads;
}


// ── FILE VALIDATOR ──────────────────────────────────────────────────────────
const FILE_LIMITS = { perFile: 5 * 1024 * 1024, total: 20 * 1024 * 1024, maxFiles: 2 };

function validateFiles(existing, incoming) {
  // Returns { valid, errors, accepted }
  const errors = [];
  const accepted = [];
  const allAfter = [...existing, ...incoming];

  if (allAfter.length > FILE_LIMITS.maxFiles) {
    errors.push(`Maximum ${FILE_LIMITS.maxFiles} PDF files allowed.`);
    return { valid: false, errors, accepted };
  }
  let totalBytes = existing.reduce((s, f) => s + f.size, 0);
  for (const f of incoming) {
    if (f.type !== 'application/pdf') { errors.push(`"${f.name}" is not a PDF.`); continue; }
    if (f.size > FILE_LIMITS.perFile)  { errors.push(`"${f.name}" exceeds 5 MB limit.`); continue; }
    totalBytes += f.size;
    if (totalBytes > FILE_LIMITS.total) { errors.push('Total attachment size exceeds 20 MB.'); break; }
    accepted.push(f);
  }
  return { valid: errors.length === 0, errors, accepted };
}


// ── PRINT HELPER ────────────────────────────────────────────────────────────
function printExpense(expense) {
  const fmt = v => (v || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 });
  const date = d => d ? new Date(d).toLocaleDateString('en-IN') : '—';

  const items = (expense.items || []).map(it => `
    <tr>
      <td>${it.head || '—'}</td>
      <td>${it.subHead || '—'}</td>
      <td>${it.description || ''}</td>
      <td style="text-align:right">₹${fmt(it.amount)}</td>
    </tr>`).join('');

  // Generate approval history timeline
  const approvalHistory = (expense.historyJSON || []).map(h => `
    <tr>
      <td>${h.action || '—'}</td>
      <td>${h.name || '—'}</td>
      <td>${date(h.timestamp)}</td>
      <td>${h.note || '—'}</td>
    </tr>`).join('');

  // Generate bank details for ADVANCE expenses
  const bankDetails = expense.bankDetails && expense.expenseType === 'ADVANCE' ? `
  <div class="section">
    <h3>Bank Details</h3>
    <div class="grid bank-grid">
      <div><div class="label">Account Name</div><div class="val">${expense.bankDetails.accountName || '—'}</div></div>
      <div><div class="label">Account Number</div><div class="val">${expense.bankDetails.accountNumber || '—'}</div></div>
      <div><div class="label">IFSC Code</div><div class="val">${expense.bankDetails.ifsc || '—'}</div></div>
      <div><div class="label">Bank Name</div><div class="val">${expense.bankDetails.bankName || '—'}</div></div>
    </div>
  </div>` : '';

  const html = `<!DOCTYPE html><html><head><title>Expense ${expense.referenceNumber}</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:12px;color:#111;margin:24px}
    .header{display:flex;align-items:center;margin-bottom:20px;border-bottom:2px solid #333;padding-bottom:10px}
    .logo{height:50px;margin-right:20px}
    .header-text{flex:1}
    h1{font-size:18px;margin:0 0 4px}
    .subtitle{color:#555;margin:0 0 20px}
    .section{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #eee}
    .section h3{font-size:14px;margin:0 0 12px;color:#333;text-transform:uppercase;letter-spacing:.05em}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:16px}
    .bank-grid{grid-template-columns:1fr 1fr 1fr 1fr}
    .label{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
    .val{font-weight:600;margin-top:2px}
    table{width:100%;border-collapse:collapse;margin-bottom:16px}
    th{background:#f0f0f0;padding:6px 8px;text-align:left;font-size:11px;border:1px solid #ddd}
    td{padding:5px 8px;border:1px solid #ddd;font-size:11px}
    .total{text-align:right;font-weight:700;font-size:13px;padding:8px}
    .remarks{background:#fff8e1;border:1px solid #ffe082;padding:8px 12px;border-radius:4px;margin-top:12px}
    .footer{margin-top:32px;display:flex;justify-content:space-between}
    .sig-box{border-top:1px solid #aaa;padding-top:4px;width:180px;text-align:center;font-size:10px;color:#555}
    @media print{
      body{margin:12px}
      .header{border-bottom-color:#000}
    }
  </style></head><body>
  <div class="header">
    <img src="https://i.ibb.co/5gjs4xhq/Untitled-design-15.png" alt="Company Logo" class="logo">
    <div class="header-text">
      <h1>Expense Management System</h1>
      <p class="subtitle">Expense Request — ${expense.referenceNumber}</p>
    </div>
  </div>

  <div class="section">
    <h3>Basic Information</h3>
    <div class="grid">
      <div><div class="label">Employee</div><div class="val">${expense.employeeName || '—'}</div></div>
      <div><div class="label">Project</div><div class="val">${expense.projectCode || '—'}</div></div>
      <div><div class="label">Expense Date</div><div class="val">${date(expense.expenseDate)}</div></div>
      <div><div class="label">Submitted On</div><div class="val">${date(expense.createdAt)}</div></div>
      <div><div class="label">Status</div><div class="val">${expense.expenseStatus || '—'}</div></div>
      <div><div class="label">Stage</div><div class="val">${expense.currentStage || '—'}</div></div>
      <div><div class="label">Expense Type</div><div class="val">${expense.expenseType || '—'}</div></div>
      ${expense.approvedByName ? `<div><div class="label">Approved By</div><div class="val">${expense.approvedByName}</div></div>` : ''}
    </div>
  </div>

  <div class="section">
    <h3>Financial Details</h3>
    <div class="grid">
      <div><div class="label">Total Amount</div><div class="val">₹${fmt(expense.totalAmount)}</div></div>
      ${expense.totalApprovedAmount ? `<div><div class="label">Approved Amount</div><div class="val">₹${fmt(expense.totalApprovedAmount)}</div></div>` : ''}
      ${expense.totalPaidAmount ? `<div><div class="label">Paid Amount</div><div class="val">₹${fmt(expense.totalPaidAmount)}</div></div>` : ''}
    </div>
  </div>

  <div class="section">
    <h3>Expense Items</h3>
    <table>
      <thead><tr><th>Head</th><th>Sub-Head</th><th>Description</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody>${items}</tbody>
      <tfoot><tr><td colspan="3" class="total">Total</td><td class="total">₹${fmt(expense.totalAmount)}</td></tr></tfoot>
    </table>
  </div>

  ${bankDetails}

  ${expense.historyJSON && expense.historyJSON.length ? `
  <div class="section">
    <h3>Approval History</h3>
    <table>
      <thead><tr><th>Action</th><th>By</th><th>Date</th><th>Notes</th></tr></thead>
      <tbody>${approvalHistory}</tbody>
    </table>
  </div>` : ''}

  ${expense.description ? `
  <div class="section">
    <h3>Description</h3>
    <div class="remarks">${expense.description}</div>
  </div>` : ''}

  ${expense.remarks ? `<div class="remarks"><strong>Remarks:</strong> ${expense.remarks}</div>` : ''}

  <div class="footer">
    <div class="sig-box">Submitted by<br><strong>${expense.employeeName || '—'}</strong></div>
    <div class="sig-box">Approved by</div>
    <div class="sig-box">Accounts</div>
  </div>
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 400);
}



// ═══════════════════════════════════════════════════════════════════════════
// 4. TICKETS VIEW
// ═══════════════════════════════════════════════════════════════════════════
const TicketsView = {
  name: 'TicketsView',
  setup() {
    const store = useStore();
    const router = useRouter();
    const { smAndDown } = useDisplay();

    const userRole  = computed(() => store.getters['auth/userRole']);
    const canProcessPayments = computed(() => store.getters['auth/canProcessPayments']);
    const currentUserId = computed(() => store.getters['auth/userID']);

    const allTickets  = computed(() => store.getters['tickets/all'] || []);
    const isLoading   = computed(() => store.getters['tickets/isLoading']);

    // ─── Tabs ─────────────────────────────────────────────────────────
    const activeTab = ref('all');

    // Tab-specific ticket counts
    const awaitingBillTickets = computed(() =>
      allTickets.value.filter(t => t.ticketStatus === 'BILLED')
    );
    const paymentPendingTickets = computed(() =>
      allTickets.value.filter(t => ['CREATED', 'PAYMENT_PARTIAL'].includes(t.ticketStatus))
    );
    const completedTickets = computed(() =>
      allTickets.value.filter(t => ['CLOSED', 'FORCE_CLOSED', 'REIMBURSED_CLOSED', 'SETTLED'].includes(t.ticketStatus))
    );

    // ─── Filters ──────────────────────────────────────────────────────
    const filterStatus = ref('');
    const filterSearch = ref('');
    const filterDateFrom = ref('');
    const filterDateTo = ref('');
    const filterProject = ref('');
    const filterQuick = ref('');

    // Get unique projects for filter dropdown
    const projectList = computed(() => {
      const projects = new Set(allTickets.value.map(t => t.projectCode).filter(Boolean));
      return Array.from(projects).sort();
    });

    // Export to CSV
    const exportToCSV = () => {
      const data = filteredTickets.value.map(t => ({
        'Ticket #': t.ticketNumber || '',
        'Ref #': t.referenceNumber || '',
        'Employee': t.employeeName || '',
        'Project': t.projectCode || '',
        'Expense Type': t.expenseType || '',
        'Amount': t.amount || 0,
        'Paid': t.paidAmount || 0,
        'Remaining': (t.amount || 0) - (t.paidAmount || 0),
        'Status': t.ticketStatus || '',
        'Created': fd(t.createdAt),
      }));
      
      const headers = Object.keys(data[0] || {});
      const csvContent = [
        headers.join(','),
        ...data.map(row => headers.map(h => `"${row[h]}"`).join(','))
      ].join('\n');
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `tickets_export_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    };

    const filteredTickets = computed(() => {
      let list = allTickets.value;
      
      // Apply tab-based filtering
      if (activeTab.value === 'awaitingBill') {
        list = list.filter(t => t.ticketStatus === 'BILLED');
      } else if (activeTab.value === 'paymentPending') {
        list = list.filter(t => ['CREATED', 'PAYMENT_PARTIAL'].includes(t.ticketStatus));
      } else if (activeTab.value === 'completed') {
        list = list.filter(t => ['CLOSED', 'FORCE_CLOSED', 'REIMBURSED_CLOSED', 'SETTLED'].includes(t.ticketStatus));
      }
      
      // Apply quick filters
      if (filterQuick.value === 'partial') {
        list = list.filter(t => t.ticketStatus === 'PAYMENT_PARTIAL');
      } else if (filterQuick.value === 'full') {
        list = list.filter(t => ['PAYMENT_FULL', 'BILLED'].includes(t.ticketStatus));
      }
      
      // Apply other filters
      if (filterStatus.value) list = list.filter(t => t.ticketStatus === filterStatus.value);
      if (filterProject.value) list = list.filter(t => t.projectCode === filterProject.value);
      if (filterSearch.value) {
        const q = filterSearch.value.toLowerCase();
        list = list.filter(t =>
          (t.ticketNumber||'').toLowerCase().includes(q) ||
          (t.employeeName||'').toLowerCase().includes(q) ||
          (t.referenceNumber||'').toLowerCase().includes(q)
        );
      }
      // Date range filter
      if (filterDateFrom.value) {
        const from = new Date(filterDateFrom.value);
        list = list.filter(t => new Date(t.createdAt) >= from);
      }
      if (filterDateTo.value) {
        const to = new Date(filterDateTo.value);
        to.setHours(23, 59, 59);
        list = list.filter(t => new Date(t.createdAt) <= to);
      }
      return list;
    });

    const getStatusColor = s => {
      const l = (s||'').toLowerCase();
      if (['billed','closed'].includes(l))              return 'success';
      if (['created','payment_partial'].includes(l))    return 'warning';
      if (['payment_full'].includes(l))                 return 'info';
      if (['bill_rejected','force_closed'].includes(l)) return 'error';
      return 'secondary';
    };
    const fd = d => d ? new Date(d).toLocaleDateString('en-IN') : '—';

    const headers = [
      { title: 'Ticket #',   key: 'ticketNumber',  width: '150px' },
      { title: 'Ref #',      key: 'referenceNumber',width: '150px' },
      { title: 'Employee',   key: 'employeeName',  width: '150px' },
      { title: 'Expense Date', key: 'expenseDate',     width: '110px' },
      { title: 'Bill Date',    key: 'billSubmittedAt', width: '110px' },
      { title: 'Amount',     key: 'amount',        width: '110px', align: 'end' },
      { title: 'Paid',       key: 'paidAmount',    width: '110px', align: 'end' },
      { title: 'Status',     key: 'ticketStatus',  width: '130px' },
      { title: 'Type',       key: 'expenseType',   width: '100px' },
      { title: 'Date',       key: 'createdAt',     width: '100px' },
      { title: '',           key: 'actions',       sortable: false, width: '80px', align: 'end' },
    ];

    // ── Detail ─────────────────────────────────────────────────────────────
    const showDetail    = ref(false);
    const detailLoading = ref(false);
    const selectedTicket= ref(null);

    const openDetail = async (t) => {
      showDetail.value    = true;
      selectedTicket.value= t;
      if (!t.paymentJSON || !t.billJSON) {
        detailLoading.value = true;
        try {
          const full = await store.dispatch('tickets/fetchTicket', t.ticketNumber);
          selectedTicket.value = full;
        } catch (e) {
          console.warn('Could not refresh ticket data:', e.message);
        } finally {
          detailLoading.value = false;
        }
      }
    };
    const closeDetail = () => { showDetail.value = false; selectedTicket.value = null; };

    // ── Payment ────────────────────────────────────────────────────────────
    const showPayment    = ref(false);
    const paymentLoading = ref(false);
    const paymentForm    = ref({ amount: null, paymentMode: 'NEFT', transactionRef: '', paymentDate: '', notes: '' });

    const openPaymentDialog = () => {
      paymentForm.value = { amount: null, paymentMode: 'NEFT', transactionRef: '', paymentDate: new Date().toISOString().split('T')[0], notes: '' };
      showPayment.value = true;
    };

    const submitPayment = async () => {
      if (!paymentForm.value.amount || paymentForm.value.amount <= 0) {
        store.dispatch('ui/showSnackbar', { message: 'Enter a valid payment amount.', color: 'warning' });
        return;
      }
      paymentLoading.value = true;
      try {
        await store.dispatch('tickets/processPayment', {
          ticketNumber:   selectedTicket.value.ticketNumber,
          amount:         paymentForm.value.amount,
          paymentMode:    paymentForm.value.paymentMode,
          transactionRef: paymentForm.value.transactionRef,
          paymentDate:    paymentForm.value.paymentDate,
          billDate:       paymentForm.value.billDate,
          notes:          paymentForm.value.notes,
        });
        showPayment.value = false;
        const full = await store.dispatch('tickets/fetchTicket', selectedTicket.value.ticketNumber);
        selectedTicket.value = full;
      } catch (e) { /* shown by store */ }
      finally { paymentLoading.value = false; }
    };

    // ── Bill Submission ────────────────────────────────────────────────────
    const showBill     = ref(false);
    const billLoading  = ref(false);
    const billFiles    = ref([]);  // File[]
    const billErrors   = ref([]);
    const billCourier  = ref({ number: '', type: '' });
    const billItems    = ref([]);  // optional structured bills
    const pendingBillItem = ref({ head: '', subHead: '', description: '', amount: null, customSubHead: '' });
    watch(() => pendingBillItem.value.head, () => { pendingBillItem.value.subHead = ''; });
    const billSubHeads   = computed(() => subHeadsFor(pendingBillItem.value.head));
    const billItemIsCustom = computed(() => pendingBillItem.value.subHead === 'Custom / Other' || pendingBillItem.value.head === 'Custom');

    const openBillDialog = () => {
      billFiles.value  = [];
      billErrors.value = [];
      billItems.value  = [];
      billCourier.value= { number: '', type: '' };
      pendingBillItem.value = { head: '', subHead: '', description: '', amount: null, customSubHead: '' };
      showBill.value   = true;
    };

    // Bill Verification Actions
    const showBillApproval = ref(false);
    const showBillCorrections = ref(false);
    const showBillRejection = ref(false);
    const billActionLoading = ref(false);
    const billApprovalNotes = ref('');
    const billCorrectionNotes = ref('');
    const billRejectionReason = ref('');

    const openBillApprovalDialog = () => {
      billApprovalNotes.value = '';
      showBillApproval.value = true;
    };

    const openBillCorrectionsDialog = () => {
      billCorrectionNotes.value = '';
      showBillCorrections.value = true;
    };

    const openBillRejectionDialog = () => {
      billRejectionReason.value = '';
      showBillRejection.value = true;
    };

    const submitBillApproval = async () => {
      billActionLoading.value = true;
      try {
        await store.dispatch('tickets/approveBills', {
          ticketNumber: selectedTicket.value.ticketNumber,
          verificationNotes: billApprovalNotes.value
        });
        showBillApproval.value = false;
        const full = await store.dispatch('tickets/fetchTicket', selectedTicket.value.ticketNumber);
        selectedTicket.value = full;
      } catch (e) { /* shown by store */ }
      finally { billActionLoading.value = false; }
    };

    const submitBillCorrections = async () => {
      if (!billCorrectionNotes.value.trim()) {
        store.dispatch('ui/showSnackbar', { 
          message: 'Please provide correction notes.', 
          color: 'warning' 
        });
        return;
      }
      billActionLoading.value = true;
      try {
        await store.dispatch('tickets/requestBillCorrections', {
          ticketNumber: selectedTicket.value.ticketNumber,
          corrections: billCorrectionNotes.value
        });
        showBillCorrections.value = false;
        const full = await store.dispatch('tickets/fetchTicket', selectedTicket.value.ticketNumber);
        selectedTicket.value = full;
      } catch (e) { /* shown by store */ }
      finally { billActionLoading.value = false; }
    };

    const submitBillRejection = async () => {
      if (!billRejectionReason.value.trim()) {
        store.dispatch('ui/showSnackbar', { 
          message: 'Please provide rejection reason.', 
          color: 'warning' 
        });
        return;
      }
      billActionLoading.value = true;
      try {
        await store.dispatch('tickets/rejectBills', {
          ticketNumber: selectedTicket.value.ticketNumber,
          rejectionReason: billRejectionReason.value
        });
        showBillRejection.value = false;
        const full = await store.dispatch('tickets/fetchTicket', selectedTicket.value.ticketNumber);
        selectedTicket.value = full;
      } catch (e) { /* shown by store */ }
      finally { billActionLoading.value = false; }
    };

    // Handlers that open the modals
    const handleApproveBills = (ticketNumber) => {
      openBillApprovalDialog();
    };

    const handleRejectBills = (ticketNumber) => {
      openBillRejectionDialog();
    };

    const handleRequestCorrections = (ticketNumber) => {
      openBillCorrectionsDialog();
    };

    const handleFileInput = (event) => {
      const incoming = Array.from(event.target.files || []);
      const result   = validateFiles(billFiles.value, incoming);
      billErrors.value = result.errors;
      billFiles.value  = [...billFiles.value, ...result.accepted];
      event.target.value = '';
    };

    const removeBillFile = (i) => billFiles.value.splice(i, 1);

    const appendBillItem = () => {
      const it = pendingBillItem.value;
      if (!it.head || !(it.amount > 0)) {
        store.dispatch('ui/showSnackbar', { message: 'Head and amount required.', color: 'warning' });
        return;
      }
      billItems.value.push({
        head: it.head,
        subHead: billItemIsCustom.value ? (it.customSubHead || 'Custom') : it.subHead,
        description: it.description,
        amount: parseFloat(it.amount),
      });
      pendingBillItem.value = { head: '', subHead: '', description: '', amount: null, customSubHead: '' };
    };

    const submitBill = async () => {
      billLoading.value = true;
      try {
        // Convert files to base64 for GAS transmission
        const attachments = await Promise.all(billFiles.value.map(f => new Promise((res, rej) => {
          const r = new FileReader();
          r.onload  = () => res({ name: f.name, size: f.size, type: f.type, data: r.result.split(',')[1] });
          r.onerror = rej;
          r.readAsDataURL(f);
        })));

        await store.dispatch('tickets/submitBills', {
          ticketNumber:  selectedTicket.value.ticketNumber,
          billItems:     billItems.value,
          courierNumber: billCourier.value.number,
          courierType:   billCourier.value.type,
          attachments,
        });
        showBill.value = false;
        const full = await store.dispatch('tickets/fetchTicket', selectedTicket.value.ticketNumber);
        selectedTicket.value = full;
      } catch (e) { /* shown by store */ }
      finally { billLoading.value = false; }
    };

    onMounted(async () => {
      if (!allTickets.value.length) await store.dispatch('tickets/fetchTickets').catch(()=>{});
    });

    return {
      smAndDown, canProcessPayments, currentUserId,
      allTickets, filteredTickets, isLoading,

// ── ticket-detail-modal ─────────────────────────────────────────────────────
app.component('ticket-detail-modal', {
  props: {
    modelValue: Boolean,
    ticket:     Object,
    loading:    { type: Boolean, default: false },
    canProcessPayments: { type: Boolean, default: false },
    isOwner: { type: Boolean, default: false },
  },
  emits: ['update:modelValue','close','process-payment','submit-bills',
        'approve-bills','request-corrections','reject-bills'],
  setup(props, { emit }) {
    const fd  = d => d ? new Date(d).toLocaleDateString('en-IN') : '—';
    const fmt = v => (v||0).toLocaleString('en-IN', { minimumFractionDigits: 2 });
    const getStatusColor = s => {
      const l = (s||'').toLowerCase();
      if (['billed','closed'].includes(l))              return 'success';
      if (['created','payment_partial'].includes(l))    return 'warning';
      if (['payment_full'].includes(l))                 return 'info';
      if (['bill_rejected','force_closed'].includes(l)) return 'error';
      return 'secondary';
    };
    const close         = () => emit('update:modelValue', false);
    const processPayment= () => emit('process-payment');
    const submitBills   = () => emit('submit-bills');
    const canPay  = computed(() => props.canProcessPayments && props.ticket &&
      ['CREATED','PAYMENT_PARTIAL'].includes(props.ticket.ticketStatus));
    const canBill = computed(() => {
      // Only allow bill submission for ADVANCE expense types
      // REIMBURSEMENT expenses already submit bills during expense creation
      if (!props.isOwner || !props.ticket) return false;
      if (props.ticket.expenseType === 'REIMBURSEMENT') return false;
      return props.ticket.ticketStatus === 'PAYMENT_FULL';
    });
    const canVerifyBills = computed(() => {
      if (!props.canProcessPayments || !props.ticket) return false;
      return ['BILLED', 'BILL_CORRECTION_NEEDED'].includes(props.ticket.ticketStatus);
    });
    const balance = computed(() => props.ticket

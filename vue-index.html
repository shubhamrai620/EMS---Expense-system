<!-- ── 3. UTILS ──────────────────────────────────────────────── -->
<script>
const Utils = {
  getToken() { return sessionStorage.getItem('ems_token') || ''; },
  setToken(token) {
    if (token) sessionStorage.setItem('ems_token', token);
    else sessionStorage.removeItem('ems_token');
  },

  request(functionName, params = {}) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(response => {
          try {
            const data = typeof response === 'string' ? JSON.parse(response) : response;
            if (data?.ok === false && data?.error) {
              reject(new Error(data.error.message || 'Request failed'));
            } else if (data?.error) {
              reject(new Error(typeof data.error === 'string' ? data.error : (data.error.message || 'Request failed')));
            } else {
              resolve(data?.ok === true && data?.data ? data.data : data);
            }
          } catch { reject(new Error('Invalid response from server')); }
        })
        .withFailureHandler(err => reject(new Error(err?.message || 'Request failed')))
        [functionName](JSON.stringify(params));
    });
  },

  formatDate(date, format = 'short') {
    if (!date) return 'N/A';
    try {
      let d;
      if (typeof date === 'string') {
        if (/^\d{4}-\d{2}-\d{2}T/.test(date)) {
          d = new Date(date);
        } else {
          const clean = date.split('T')[0].split(' ')[0].trim();
          if (/^\d{4}-\d{2}-\d{2}$/.test(clean)) {
            const [y,m,day] = clean.split('-').map(Number);
            d = new Date(y, m-1, day);
          } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(clean)) {
            const [day,m,y] = clean.split('/').map(Number);
            d = new Date(y, m-1, day);
          } else if (/^\d{2}-\d{2}-\d{4}$/.test(clean)) {
            const [day,m,y] = clean.split('-').map(Number);
            d = new Date(y, m-1, day);
          } else {
            d = new Date(date);
          }
        }
      } else { d = date instanceof Date ? date : new Date(date); }
      if (isNaN(d.getTime())) return String(date);

      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      if (format === 'relative') {
        const now = new Date(); now.setHours(0,0,0,0);
        const cmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const diff = Math.floor((now - cmp) / 86400000);
        if (diff === 0)  return 'Today';
        if (diff === 1)  return 'Yesterday';
        if (diff === -1) return 'Tomorrow';
        if (diff > 0 && diff < 7)   return `${diff}d ago`;
        if (diff < 0 && diff > -7)  return `In ${Math.abs(diff)}d`;
        if (diff >= 7 && diff < 30) return `${Math.floor(diff/7)}w ago`;
        return `${String(cmp.getDate()).padStart(2,'0')}-${months[cmp.getMonth()]}-${cmp.getFullYear()}`;
      }

      const out = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      return `${String(out.getDate()).padStart(2,'0')}-${months[out.getMonth()]}-${out.getFullYear()}`;
    } catch { return String(date); }
  },

  formatCurrency(amount) {
    const n = parseFloat(amount) || 0;
    return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  },

  formatTime(time) {
    if (!time) return '';
    const [h, m] = time.split(':').map(Number);
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  },

  // Maps backend STATUS / TICKET_STATUS values to Vuetify color names
  statusColor(status) {
    const map = {
      // Expense status
      SUBMITTED:              'warning',
      APPROVED:               'success',
      REJECTED:               'error',
      CANCELLED:              'grey',
      DRAFT:                  'grey',
      // Ticket status
      CREATED:                'warning',
      PAYMENT_PARTIAL:        'orange',
      PAYMENT_FULL:           'info',
      BILLED:                 'info',
      BILL_CORRECTION_NEEDED: 'warning',
      VERIFIED:               'success',
      BILL_REJECTED:          'error',
      CLOSED:                 'grey',
      FORCE_CLOSED:           'grey',
      ADMIN_WAIVED:           'grey',
      SETTLED:                'success',
      REIMBURSED_CLOSED:      'teal',
      // Stage
      MANAGER:                'blue',
      OP_HEAD:                'purple',
      ACCOUNTS:               'teal',
      COMPLETED:              'grey',
    };
    return map[(status || '').toUpperCase()] || 'grey';
  },

  // Human-readable label for status codes
  statusLabel(status) {
    const map = {
      SUBMITTED:              'Submitted',
      APPROVED:               'Approved',
      REJECTED:               'Rejected',
      CANCELLED:              'Cancelled',
      DRAFT:                  'Draft',
      CREATED:                'Pending Payment',
      PAYMENT_PARTIAL:        'Partial Payment',
      PAYMENT_FULL:           'Awaiting Bills',
      BILLED:                 'Bills Submitted',
      BILL_CORRECTION_NEEDED: 'Correction Needed',
      VERIFIED:               'Bills Verified',
      BILL_REJECTED:          'Bills Rejected',
      CLOSED:                 'Closed',
      FORCE_CLOSED:           'Force Closed',
      ADMIN_WAIVED:           'Waived',
      SETTLED:                'Settled',
      REIMBURSED_CLOSED:      'Closed (Reimbursed)',
      MANAGER:                'At Manager',
      OP_HEAD:                'At Op Head',
      ACCOUNTS:               'At Accounts',
      COMPLETED:              'Completed',
    };
    return map[(status || '').toUpperCase()] || status || '—';
  },
};
</script>

<script>
const { createApp } = Vue;

// Schema version guard — bump APP_SCHEMA_VERSION when backend
// TOKEN_SCHEMA_VERSION changes, to force re-login with fresh token.
const APP_SCHEMA_VERSION = 2;
(function enforceSchemaVersion() {
  const stored = parseInt(sessionStorage.getItem('emsSchemaVersion') || '0', 10);
  if (stored < APP_SCHEMA_VERSION) {
    console.warn(`[Schema] v${stored} → v${APP_SCHEMA_VERSION}: clearing stale token.`);
    Utils.setToken('');
    sessionStorage.setItem('emsSchemaVersion', String(APP_SCHEMA_VERSION));
  }
})();

const app = createApp({
  mounted() {
    const token = Utils.getToken();
    if (token) {
      store.dispatch('auth/login', { token }).catch(() => Utils.setToken(''));
    }
  },
});

// Make Utils available in all templates as this.$utils
app.config.globalProperties.$utils = Utils;

// Make useStore available globally so view <script> blocks don't need to import
window.useStore = Vuex.useStore;

app.use(vuetify);
app.use(store);
</script>

<script>
const { createRouter, createWebHashHistory } = VueRouter;

// ── Route definitions ──────────────────────────────────────────────────────
const routes = [
  {
    path:      '/',
    component: DashboardView,
    meta: { title: 'Dashboard', icon: 'mdi-view-dashboard-outline', nav: true }
  },
  {
    path:      '/expenses',
    component: ExpensesView,
    meta: { title: 'Expenses', icon: 'mdi-receipt-text-outline', nav: true }
  },
  {
    path:      '/payments',
    name:      'payments',
    component: PaymentView,
    meta: {
      title:        'Payments',
      icon:         'mdi-cash-multiple',
      accountsOnly: true
    }
  },
  {
    path:      '/tickets',
    component: TicketsView,
    meta: { title: 'Tickets', icon: 'mdi-ticket-confirmation-outline', nav: true }
  },
  {
    path:      '/login',
    component: LoginView,
    meta: { title: 'Login', nav: false }
  },
  // Catch-all — redirect unknown paths to dashboard
  {
    path: '/:pathMatch(.*)*',
    redirect: '/'
  },
];

const router = createRouter({
  history: createWebHashHistory(),
  routes,
});

// ── Navigation guard ───────────────────────────────────────────────────────
router.beforeEach(async (to, from, next) => {
  const token  = Utils.getToken();
  let   isAuth = store.getters['auth/isAuth'];

  // Silent token restore if store cleared but token still in sessionStorage
  if (token && !isAuth) {
    try {
      await store.dispatch('auth/login', { token });
      isAuth = store.getters['auth/isAuth'];
    } catch {
      Utils.setToken('');
      return to.path !== '/login' ? next('/login') : next();
    }
  }

  if (to.path !== '/login' && !isAuth) return next('/login');
  if (to.path === '/login'  &&  isAuth) return next('/');
  next();
});

// Push path into GAS URL bar so browser back/forward works
router.afterEach(to => {
  try { google.script.history.push(null, null, to.path); } catch { /* local dev */ }
});

// ── Register router + mount ────────────────────────────────────────────────
app.use(router);
app.mount('#app');

console.log('✅ EMS — Vue 3 + Vuex 4 + Vuetify 3.8.2 + Vue Router 4 mounted');
console.log('   Routes:', routes.filter(r => r.meta?.nav).map(r => r.path).join(', '));
</script>
